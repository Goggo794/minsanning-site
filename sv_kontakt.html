<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt — Min Sanning | Goran Matohanac</title>
    <meta name="description" content="Kontakta författaren till Min Sanning, Goran Matohanac.">

    <style>
        :root {
            --primary-navy: #1f335c;
            --text-color: #1a1a1a;
            --muted: #555;
            --border: #dcdcdc;
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #e8f0f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
        }
        .lang-switch a {
            color: var(--muted);
            text-decoration: none;
            padding: 4px 8px;
        }
        .lang-switch a.active {
            color: var(--primary-navy);
            font-weight: 600;
        }
        .lang-switch a:hover { color: var(--primary-navy); }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: var(--primary-navy); }

        h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.5rem;
            color: var(--primary-navy);
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 1.3rem;
            font-size: 1.05rem;
            color: #2a2a2a;
        }

        /* ── Formulär ─────────────────────────────────────── */
        .contact-form {
            margin-top: 40px;
        }

        .field {
            margin-bottom: 24px;
        }

        .field label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-navy);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .field input,
        .field textarea {
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-color);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        .field input:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--primary-navy);
            box-shadow: 0 0 0 3px rgba(31, 51, 92, 0.12);
        }

        /* Honeypot — dold för människor */
        .hp {
            position: absolute;
            left: -9999px;
            opacity: 0;
            height: 0;
            width: 0;
        }

        .submit-btn {
            display: inline-block;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background-color: var(--primary-navy);
            border: none;
            border-radius: 6px;
            padding: 13px 32px;
            cursor: pointer;
            transition: background-color 0.2s ease, opacity 0.2s ease;
        }

        .submit-btn:hover { background-color: #142a4d; }
        .submit-btn:disabled { opacity: 0.6; cursor: default; }

        .form-status {
            margin-top: 24px;
            font-size: 1.05rem;
            padding: 16px 18px;
            border-radius: 6px;
            display: none;
        }
        .form-status.success {
            display: block;
            color: var(--primary-navy);
            background: #eaf2fb;
            border: 1px solid #cddcef;
        }
        .form-status.error {
            display: block;
            color: #8a1f1f;
            background: #fbeaea;
            border: 1px solid #efcdcd;
        }

        .footer-section {
            margin-top: 70px;
            padding-top: 30px;
            border-top: 2px solid var(--primary-navy);
            font-size: 0.9rem;
            color: var(--muted);
        }

        a.link {
            color: var(--primary-navy);
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @media (max-width: 540px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <a href="/kontakt" class="active">SV</a> | <a href="/en/contact">EN</a>
    </div>

    <div class="container">

        <a href="/" class="back-link">← Tillbaka</a>

        <h1>Kontakt</h1>

        <p>Frågor, tankar eller ett ord om boken — skriv nedan. Meddelandet går direkt till författaren.</p>

        <form id="contact-form" class="contact-form">
            <!-- Byt ut mot din egen Web3Forms-nyckel -->
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            <input type="hidden" name="subject" value="Nytt meddelande från minsanning.se (SV)">
            <input type="hidden" name="from_name" value="minsanning.se">

            <div class="field">
                <label for="name">Namn</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="field">
                <label for="email">E-post</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="field">
                <label for="message">Meddelande</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <!-- Honeypot-fält för att fånga bottar -->
            <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off">

            <button type="submit" class="submit-btn">Skicka</button>
        </form>

        <div id="form-status" class="form-status"></div>

        <div class="footer-section">
            <p>Gav boken dig något? <a href="https://ko-fi.com/minsanning" class="link" target="_blank">Bjud på en kaffe</a>. Eller inte.</p>
            <p>© Goran Matohanac, Logos förlag, 2026 · Licens: <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/deed.sv" class="link" target="_blank">CC BY-NC-ND 4.0</a></p>
        </div>

    </div>

    <script>
        const form = document.getElementById('contact-form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Skickar…';

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                const result = await response.json();

                if (result.success) {
                    form.style.display = 'none';
                    status.textContent = 'Tack — ditt meddelande har skickats.';
                    status.className = 'form-status success';
                } else {
                    status.textContent = 'Något gick fel. Försök igen, eller ladda om sidan.';
                    status.className = 'form-status error';
                    btn.disabled = false;
                    btn.textContent = 'Skicka';
                }
            } catch (err) {
                status.textContent = 'Något gick fel. Kontrollera din anslutning och försök igen.';
                status.className = 'form-status error';
                btn.disabled = false;
                btn.textContent = 'Skicka';
            }
        });
    </script>

</body>
</html>
