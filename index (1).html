<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Truth — Goran Matohanac</title>
    <meta name="description" content="My Truth — Notes from a Christian Father. Launching soon.">

    <style>
        :root {
            --primary-navy: #1f335c;
            --text-color: #1a1a1a;
            --muted: #555;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #e8f0f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 3rem;
            color: var(--primary-navy);
            margin: 0 0 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--primary-navy);
            margin: 0 0 60px;
        }

        .message {
            font-size: 1.15rem;
            color: #333;
            margin: 0 0 15px;
            line-height: 1.5;
        }

        .submessage {
            font-size: 1rem;
            color: var(--muted);
            margin: 0;
        }

        .author {
            margin-top: 80px;
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 540px) {
            h1 { font-size: 2.25rem; letter-spacing: 1.5px; }
            .subtitle { font-size: 1.05rem; margin-bottom: 50px; }
            .message { font-size: 1.05rem; }
            .submessage { font-size: 0.95rem; }
            .author { margin-top: 60px; font-size: 0.8rem; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>My Truth</h1>
        <p class="subtitle">Notes from a Christian Father</p>

        <p class="message">We are launching soon.</p>
        <p class="submessage">Stay tuned for the books.</p>

        <p class="author">Goran Matohanac</p>

    </div>

</body>
</html>
